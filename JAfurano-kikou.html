<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JAみどり野 機構図エディタ（デモ）</title>
<style>
/* ============================================================
   機構図エディタ 配布用デモ — バウハウス・デザイン
   単独HTMLファイル版：データはブラウザ内（localStorage）に保存
   団体名・氏名はすべて架空のサンプルです
   ============================================================ */
:root {
  --red: #E4002B;
  --blue: #1D4FBB;
  --yellow: #F2B705;
  --ink: #141414;
  --paper: #F4F0E6;
  --white: #FFFFFF;
  --shadow: 4px 4px 0 var(--ink);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Futura, "Avenir Next", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  background: var(--paper);
  color: var(--ink);
  background-image:
    linear-gradient(rgba(20,20,20,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(20,20,20,.045) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ---------- ヘッダー ---------- */
#topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  background: var(--ink); color: var(--white);
  padding: 10px 20px;
  border-bottom: 6px solid var(--red);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand h1 {
  font-size: 20px; font-weight: 800; letter-spacing: .12em;
  display: flex; flex-direction: column; line-height: 1.1;
}
.brand h1 small {
  font-size: 9px; font-weight: 600; letter-spacing: .3em; color: #bbb;
}
.shape { display: inline-block; width: 22px; height: 22px; }
.shape.circle { background: var(--red); border-radius: 50%; }
.shape.triangle {
  width: 0; height: 0; background: none;
  border-left: 12px solid transparent; border-right: 12px solid transparent;
  border-bottom: 22px solid var(--yellow);
}
.shape.square { background: var(--blue); }

.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar .hint-chip {
  font-size: 10px; color: #ccc; letter-spacing: .06em;
  border: 1px dashed #777; padding: 3px 10px;
}
.toolbar .stats { font-size: 11px; letter-spacing: .08em; color: #ccc; margin: 0 8px; }
.toolbar button {
  font-family: inherit; font-weight: 800; font-size: 13px;
  letter-spacing: .1em; cursor: pointer;
  background: var(--white); color: var(--ink);
  border: 3px solid var(--white); padding: 6px 14px;
}
.toolbar button:hover { transform: translate(-1px, -1px); }
.toolbar .btn-red   { background: var(--red);   border-color: var(--red);   color: var(--white); }
.toolbar .btn-blue  { background: var(--blue);  border-color: var(--blue);  color: var(--white); }
.toolbar .btn-black { background: var(--ink);   border-color: var(--white); color: var(--white); }
#zoom-label { font-size: 12px; min-width: 42px; text-align: center; }

/* ---------- チャート（キャンバス全体が待機場所を兼ねる） ---------- */
#stage { padding: 24px; overflow: auto; min-height: calc(100vh - 70px); }
#chart {
  position: relative;
  transform-origin: top left;
  width: max-content;
  min-width: 1200px;
  padding-right: 320px;
  padding-bottom: 240px;
}

.unit { display: flex; align-items: flex-start; gap: 0; margin: 8px 0; }
.unit-col { display: flex; flex-direction: column; }

/* ---- 接続線（親箱 → 縦幹線 → 各子箱）。色は JS が --line に部の系統色を設定 ---- */
.unit-children {
  display: flex; flex-direction: column;
  position: relative;
  margin-left: 52px;
  --line: var(--ink);
}
.unit-children::before {
  content: ""; position: absolute;
  left: -52px; top: 20px; width: 30px; height: 4px;
  background: var(--line);
}
.unit-children > .unit { position: relative; }
.unit-children > .unit:first-child { margin-top: 0; }
.unit-children > .unit::before {
  content: ""; position: absolute;
  left: -26px; top: 20px; width: 26px; height: 4px;
  background: var(--line);
}
.unit-children > .unit::after {
  content: ""; position: absolute;
  left: -26px; top: -8px; bottom: -8px; width: 4px;
  background: var(--line);
}
.unit-children > .unit:first-child::after { top: 20px; }
.unit-children > .unit:last-child::after  { bottom: calc(100% - 24px); }

.unit-box {
  width: 236px;
  background: var(--white);
  border: 3px solid var(--ink);
  box-shadow: var(--shadow);
  margin: 4px 0;
}
.unit-box .unit-name {
  display: flex; align-items: center; gap: 8px;
  font-weight: 800; font-size: 13px; letter-spacing: .14em;
  padding: 5px 10px;
  border-bottom: 3px solid var(--ink);
}
.unit-name .badge {
  margin-left: auto; font-size: 10px; font-weight: 800;
  background: var(--white); color: var(--ink);
  padding: 0 6px; border: 2px solid var(--ink);
}

/* ---------- 役職枠（スロット） ---------- */
.slot { padding: 4px 6px 6px; }
.slot + .slot { border-top: 2px solid rgba(20,20,20,.15); }
.slot-label {
  font-size: 9px; font-weight: 800; letter-spacing: .22em;
  color: #777; margin-bottom: 3px;
}
.slot-members { display: flex; flex-direction: column; gap: 5px; min-height: 24px; }
.slot-empty {
  font-size: 9px; color: #b5b0a4; letter-spacing: .3em; text-align: center;
  border: 2px dashed #d8d2c4; padding: 3px 6px;
}
.slot.dragover {
  outline: 3px dashed var(--red);
  outline-offset: -2px;
  background: #FFF3D0;
}
.unit-box.dragover { outline: 4px dashed var(--red); outline-offset: -2px; }

/* ---------- 人カード ---------- */
.person {
  display: flex; align-items: center; gap: 7px;
  background: var(--white);
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 4px 7px;
  cursor: grab;
  box-shadow: 3px 3px 0 rgba(20,20,20,.85);
  user-select: none;
}
.person:active { cursor: grabbing; }
.person.dragging { opacity: .35; }
.person .p-name { font-weight: 700; font-size: 13px; white-space: nowrap; }
.person .p-title {
  font-size: 9px; font-weight: 800; letter-spacing: .08em;
  padding: 1px 6px; white-space: nowrap;
  border: 2px solid var(--ink);
}
.t-yakuin  { background: var(--ink);   color: var(--white); }
.t-hosa    { background: #555;         color: var(--white); border-color: #555 !important; }
.t-kakaricho { background: var(--yellow); color: var(--ink); }
.t-shunin  { background: var(--white); color: var(--ink); }
.t-kakari  { background: var(--white); color: var(--ink); border-style: dashed !important; }
.t-ippan   { background: #eee;         color: #555; border-color: #999 !important; }
.t-shinki  { background: var(--white); color: var(--blue); border-color: var(--blue) !important; }

.person.overlap { border-color: var(--red); box-shadow: 3px 3px 0 var(--red); }
.overlap-flag {
  font-size: 9px; font-weight: 800; color: var(--white); background: var(--red);
  padding: 1px 5px; letter-spacing: .1em;
}

/* ---------- 待機カード（キャンバス上の自由配置） ---------- */
.person.floating {
  position: absolute; z-index: 20;
  border-width: 2px;
  box-shadow: 4px 4px 0 var(--ink);
  background:
    linear-gradient(var(--white), var(--white)) padding-box,
    repeating-linear-gradient(45deg, var(--ink) 0 6px, var(--yellow) 6px 12px) border-box;
  border: 3px solid transparent;
}
.float-chip {
  font-size: 9px; font-weight: 800; letter-spacing: .15em;
  background: var(--ink); color: var(--yellow);
  padding: 1px 5px;
}

/* ---------- 人事DBビューア ---------- */
#dbpanel {
  position: fixed; top: 0; right: 0; z-index: 50;
  width: 480px; max-width: 92vw; height: 100vh;
  background: var(--white);
  border-left: 6px solid var(--ink);
  transform: translateX(100%);
  transition: transform .22s ease;
  display: flex; flex-direction: column;
}
#dbpanel.open { transform: translateX(0); box-shadow: -8px 0 24px rgba(0,0,0,.25); }
.db-head {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--ink); color: var(--white); padding: 12px 16px;
}
.db-head h2 { font-size: 16px; letter-spacing: .12em; display: flex; flex-direction: column; }
.db-head h2 small { font-size: 10px; font-weight: 600; color: #aaa; letter-spacing: .06em; }
.db-head button {
  background: var(--red); color: var(--white); border: none;
  width: 30px; height: 30px; font-size: 16px; font-weight: 800; cursor: pointer;
}
.db-tabs { display: flex; border-bottom: 3px solid var(--ink); }
.db-tab {
  flex: 1; padding: 8px; font-family: inherit; font-weight: 800;
  font-size: 12px; letter-spacing: .15em; cursor: pointer;
  background: var(--paper); border: none; border-right: 3px solid var(--ink);
}
.db-tab:last-child { border-right: none; }
.db-tab.active { background: var(--yellow); }
.db-body { flex: 1; overflow: auto; padding: 10px; }
.db-body table { width: 100%; border-collapse: collapse; font-size: 11px; }
.db-body th {
  background: var(--ink); color: var(--white); text-align: left;
  padding: 4px 6px; letter-spacing: .1em; position: sticky; top: -10px;
}
.db-body td { border-bottom: 1px solid #ddd; padding: 4px 6px; }
.db-body tr.just-moved td { background: #FFF3D0; font-weight: 700; }
.db-body .log-entry {
  border: 2px solid var(--ink); margin-bottom: 8px; padding: 6px 10px;
  font-size: 11px; background: var(--white); box-shadow: 3px 3px 0 rgba(20,20,20,.15);
}
.db-body .log-entry .when { font-size: 9px; color: #777; letter-spacing: .05em; }
.db-body .log-entry .route { margin-top: 2px; }
.db-body .log-entry .arrow { color: var(--red); font-weight: 800; }
.db-body .log-entry .title-chg {
  display: inline-block; margin-left: 6px;
  font-size: 10px; font-weight: 800; color: var(--white); background: var(--blue);
  padding: 0 6px;
}

/* ---------- トースト ---------- */
#toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  z-index: 60; background: var(--ink); color: var(--white);
  border-left: 8px solid var(--yellow);
  padding: 10px 18px; font-size: 13px; font-weight: 700; letter-spacing: .05em;
  box-shadow: var(--shadow);
}

/* ---------- 印刷（白黒最適化・空欄詰め・カード枠なし） ---------- */
.print-only { display: none; }
@media print {
  @page { size: A3 landscape; margin: 8mm; }

  body { background: #fff; background-image: none; }
  .no-print { display: none !important; }
  .print-only { display: block; }

  #stage { padding: 0; overflow: visible; min-height: auto; }
  #chart { padding: 0; min-width: auto; transform: none !important; }
  #chart-title { text-align: center; margin-bottom: 12px; }
  #chart-title h2 { letter-spacing: .5em; font-size: 20px; }
  #chart-title p { font-size: 10px; color: #333; }

  .unit-box { box-shadow: none; border-width: 2px; break-inside: avoid; }
  .unit-box .unit-name { border-bottom-width: 2px; }
  .kind-top .unit-name,
  .kind-bu  .unit-name { background: #000 !important; color: #fff !important; }
  .kind-ka  .unit-name { background: #fff !important; color: #000 !important; }
  .kind-kakari .unit-name { background: #e3e3e3 !important; color: #000 !important; }
  .unit-name .badge { background: #fff; color: #000; border: 1px solid #000; }

  .unit-children::before,
  .unit-children > .unit::before,
  .unit-children > .unit::after { background: #000 !important; }

  .slot.slot-vacant { display: none !important; }
  .slot { padding: 2px 8px 4px; }
  .slot + .slot { border-top-color: #ccc; }
  .slot-label { color: #333; }
  .slot-members { min-height: 0; }

  .person { border: none !important; box-shadow: none !important; padding: 1px 0; break-inside: avoid; }
  .person .p-title {
    background: #fff !important; color: #000 !important;
    border: 1px solid #000 !important; border-style: solid !important;
    font-weight: 700;
  }
  .person.overlap { border: none !important; box-shadow: none !important; }
  .overlap-flag { background: #000 !important; color: #fff !important; }
}
</style>
</head>
<body>
<header id="topbar" class="no-print">
  <div class="brand">
    <span class="shape circle"></span>
    <span class="shape triangle"></span>
    <span class="shape square"></span>
    <h1>機構図エディタ<small>ORGANIGRAMM — JAみどり野 人事管理システム デモ（データはすべて架空）</small></h1>
  </div>
  <div class="toolbar">
    <span class="hint-chip">枠の外の余白へドロップ ＝ 待機（好きな場所に置けます）／ 役職枠へドロップ ＝ 役職を自動付与</span>
    <span id="stats" class="stats"></span>
    <button id="btn-zoom-out" title="縮小">−</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in" title="拡大">＋</button>
    <button id="btn-db" class="btn-black">人事DB</button>
    <button id="btn-print" class="btn-blue">印刷</button>
    <button id="btn-reset" class="btn-red">初期データに戻す</button>
  </div>
</header>

<main id="stage">
  <div id="chart-title" class="print-only">
    <h2>ＪＡみどり野　機構図と職員配置図</h2>
    <p id="print-date"></p>
  </div>
  <div id="chart"></div>
</main>

<!-- 人事DBビューア -->
<section id="dbpanel" class="no-print">
  <div class="db-head">
    <h2>人事データベース<small>デモ版：ブラウザ内に保存（本実装では業務DBと同期）</small></h2>
    <button id="btn-db-close">×</button>
  </div>
  <div class="db-tabs">
    <button class="db-tab active" data-tab="master">職員マスタ</button>
    <button class="db-tab" data-tab="log">異動履歴</button>
  </div>
  <div id="db-master" class="db-body"></div>
  <div id="db-log" class="db-body" hidden></div>
</section>

<div id="toast" class="no-print" hidden></div>

<script>
/* 機構図エディタ 配布用デモ — 単独HTML版
   サーバー・SQLite の代わりにブラウザ内ストレージ（localStorage）を
   「人事データベース」として使用。D&D 操作 → DB 更新 → 再描画の流れは
   本実装（server.py + SQLite）と同一。氏名・団体名はすべて架空 */
"use strict";

const TITLE_RANK = {
  "組合長": 0, "副組合長": 1, "参事": 2,

  switch (kind) {
    case "top":
      return [
        { label: "組合長",   titles: ["組合長"],   cap: 1 },
        { label: "副組合長", titles: ["副組合長"], cap: 1 },
        { label: "参事",     titles: ["参事"],     cap: 1 },

    case "bu":
      return [{ label: "部長", titles: ["部長"], cap: 1 }];
    case "ka":
      return [
        { label: "課長",     titles: ["課長"],     cap: 1 },
        { label: "課長補佐", titles: ["課長補佐"], cap: null },
      ];
    case "kakari":
      return [
        { label: "係長", titles: ["係長"], cap: null },
        { label: "主任", titles: ["主任"], cap: null },
        { label: "一般", titles: ["係", "一般職", "嘱託", "新規採用"], cap: null, defaultTitle: "係" },
      ];
    default:
      return [];
  }
}

/* ---------- ブラウザ内「人事データベース」 ---------- */
const STORE_KEY = "ja-midorino-orgchart-demo-v1";

function nowStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function seedDb() {
  const ts = nowStr();
  return {
    logSeq: 0,
    employees: SEED.map((e, i) => ({
      id: i + 1, name: e[0], title: e[1], unit_id: e[2],
      pos_x: e[3] ?? null, pos_y: e[4] ?? null, updated_at: ts,
    })),
    log: [],
  };
}

function loadDb() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) { /* localStorage 不可の環境ではメモリ内のみで動作 */ }
  return seedDb();
}

function saveDb() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch (_) {}
}

let db = loadDb();

function unitPaths() {
  const byIdMap = {};
  UNITS.forEach((u) => { byIdMap[u.id] = u; });
  const paths = {};
  UNITS.forEach((u) => {
    const parts = [];
    let cur = u;
    while (cur) {
      if (cur.kind !== "top") parts.unshift(cur.name);
      cur = cur.parent_id != null ? byIdMap[cur.parent_id] : null;
    }
    paths[u.id] = parts.join(" > ") || u.name;
  });
  return paths;
}
const UNIT_PATHS = unitPaths();

const state = { units: UNITS, employees: [], log: [], zoom: 1, lastMovedId: null };
let dragCtx = { id: null, dx: 12, dy: 12 };

const $ = (sel) => document.querySelector(sel);
const byId = (id) => state.employees.find((e) => e.id === id);
const bySort = (a, b) => a.sort - b.sort || a.id - b.id;

function fetchOrg() {
  state.employees = db.employees.map((e) => ({
    ...e,
    unit_path: e.unit_id != null ? UNIT_PATHS[e.unit_id] : "（待機場所）",
  }));
  const nameOf = {};
  db.employees.forEach((e) => { nameOf[e.id] = e.name; });
  state.log = db.log.slice(-50).reverse().map((l) => ({
    ...l,
    employee_name: nameOf[l.employee_id],
    from_path: l.from_unit_id != null ? UNIT_PATHS[l.from_unit_id] : "（待機場所）",
    to_path: l.to_unit_id != null ? UNIT_PATHS[l.to_unit_id] : "（待機場所）",
  }));
}

/* ---------- 人数集計 ---------- */
function buildCounts() {
  const kids = {};
  state.units.forEach((u) => {
    if (u.parent_id != null) (kids[u.parent_id] ||= []).push(u.id);
  });
  const direct = {};
  state.employees.forEach((e) => {
    if (e.unit_id != null) direct[e.unit_id] = (direct[e.unit_id] || 0) + 1;
  });
  const memo = {};
  const dfs = (id) => {
    if (memo[id] != null) return memo[id];
    let n = direct[id] || 0;
    (kids[id] || []).forEach((c) => { n += dfs(c); });
    return (memo[id] = n);
  };
  state.units.forEach((u) => dfs(u.id));
  return memo;
}

function badgeText(unit, members, counts) {
  if (unit.kind === "top") return `全 ${state.employees.length}名`;
  if (unit.kind === "kakari") return `${members.length}名`;
  return `計 ${counts[unit.id]}名`;
}

/* ---------- 配色（部ごとの色系統） ---------- */
function buildColors() {
  const map = {};
  state.units.filter((u) => u.kind === "top").forEach((t) => {
    map[t.id] = { bg: "#141414", fg: "#fff", line: "#141414" };
  });
  const bus = state.units.filter((u) => u.kind === "bu").sort(bySort);
  bus.forEach((b, i) => {
    const h = BU_HUES[i % BU_HUES.length];
    map[b.id] = { bg: `hsl(${h},62%,36%)`, fg: "#fff", line: `hsl(${h},62%,36%)` };
    const kas = state.units.filter((u) => u.parent_id === b.id).sort(bySort);
    kas.forEach((k, ki) => {
      const hk = h + (ki - (kas.length - 1) / 2) * 14;
      map[k.id] = { bg: `hsl(${hk},56%,47%)`, fg: "#fff", line: `hsl(${hk},56%,47%)` };
      const kks = state.units.filter((u) => u.parent_id === k.id).sort(bySort);
      kks.forEach((s, si) => {
        const hs = hk + (si - (kks.length - 1) / 2) * 8;
        map[s.id] = { bg: `hsl(${hs},50%,80%)`, fg: "#141414", line: `hsl(${hs},50%,58%)` };
      });
    });
  });
  return map;
}

/* ---------- 人カード ---------- */
function personCard(emp, overlap) {
  const el = document.createElement("div");
  el.className = "person" + (overlap ? " overlap" : "");
  el.draggable = true;
  el.dataset.empId = emp.id;
  const title = document.createElement("span");
  title.className = "p-title " + (TITLE_CLASS[emp.title] || "t-kakari");
  title.textContent = emp.title;
  const name = document.createElement("span");
  name.className = "p-name";
  name.textContent = emp.name;
  el.append(title, name);
  if (overlap) {
    const flag = document.createElement("span");
    flag.className = "overlap-flag";
    flag.textContent = "仮";
    flag.title = "定員1の枠に複数並んでいます（異動作業中の仮置き）";
    el.append(flag);
  }
  el.addEventListener("dragstart", (e) => {
    const dx = Math.max(0, Math.min(260, e.offsetX || 12));
    const dy = Math.max(0, Math.min(40, e.offsetY || 12));
    dragCtx = { id: emp.id, dx, dy };
    e.dataTransfer.setData("text/plain", String(emp.id));
    e.dataTransfer.effectAllowed = "move";
    el.classList.add("dragging");
  });
  el.addEventListener("dragend", () => el.classList.remove("dragging"));
  return el;
}

function membersOf(unitId) {
  return state.employees
    .filter((e) => e.unit_id === unitId)
    .sort((a, b) => (TITLE_RANK[a.title] ?? 99) - (TITLE_RANK[b.title] ?? 99) || a.id - b.id);
}

/* ---------- D&D 共通 ---------- */
function makeDrop(el, onDrop) {
  el.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    el.classList.add("dragover");
  });
  el.addEventListener("dragleave", () => el.classList.remove("dragover"));
  el.addEventListener("drop", async (e) => {
    e.preventDefault();
    e.stopPropagation();
    el.classList.remove("dragover");
    const raw = e.dataTransfer.getData("text/plain");
    const id = Number.isInteger(dragCtx.id) ? dragCtx.id : parseInt(raw, 10);
    if (!Number.isInteger(id)) return;
    await onDrop(id, e);
  });
}

/* ---------- 役職枠（スロット） ---------- */
function slotNode(unit, slot, list, forceFlag) {
  const el = document.createElement("div");
  el.className = "slot dropzone" + (list.length === 0 ? " slot-vacant" : "");
  const label = document.createElement("div");
  label.className = "slot-label";
  label.textContent = slot.label;
  const members = document.createElement("div");
  members.className = "slot-members";
  const overlap = forceFlag || (slot.cap === 1 && list.length > 1);
  if (list.length === 0) {
    const empty = document.createElement("div");
    empty.className = "slot-empty";
    empty.textContent = "空";
    members.append(empty);
  } else {
    list.forEach((e) => members.append(personCard(e, overlap)));
  }
  el.append(label, members);
  makeDrop(el, async (id) => {
    const emp = byId(id);
    if (!emp) return;
    const keep = slot.titles.length === 0 || slot.titles.includes(emp.title);
    const newTitle = keep ? emp.title : (slot.defaultTitle || slot.titles[0]);
    await moveEmployee(id, unit.id, { newTitle });
  });
  return el;
}

function unitNode(unit, colors, counts) {
  const wrap = document.createElement("div");
  wrap.className = "unit";

  const col = document.createElement("div");
  col.className = "unit-col";
  const box = document.createElement("div");
  box.className = `unit-box kind-${unit.kind} dropzone`;
  box.dataset.unitId = unit.id;

  const c = colors[unit.id] || { bg: "#141414", fg: "#fff", line: "#141414" };
  const head = document.createElement("div");
  head.className = "unit-name";
  head.style.background = c.bg;
  head.style.color = c.fg;
  head.textContent = unit.name;
  const badge = document.createElement("span");
  badge.className = "badge";
  const members = membersOf(unit.id);
  badge.textContent = badgeText(unit, members, counts);
  head.append(badge);
  box.append(head);

  const slots = slotsFor(unit.kind);
  const used = new Set();
  slots.forEach((slot) => {
    const list = members.filter((m) => slot.titles.includes(m.title));
    list.forEach((m) => used.add(m.id));
    box.append(slotNode(unit, slot, list, false));
  });
  const leftover = members.filter((m) => !used.has(m.id));
  if (leftover.length) {
    box.append(slotNode(unit, { label: "仮置き", titles: [], cap: 0 }, leftover, true));
  }

  makeDrop(box, async (id) => {
    const emp = byId(id);
    if (!emp) return;
    let slot = slots.find((s) => s.titles.includes(emp.title));
    if (!slot) slot = unit.kind === "kakari" ? slots[slots.length - 1] : slots[0];
    const keep = slot.titles.includes(emp.title);
    const newTitle = keep ? emp.title : (slot.defaultTitle || slot.titles[0]);
    await moveEmployee(id, unit.id, { newTitle });
  });

  col.append(box);
  wrap.append(col);

  const children = state.units.filter((u) => u.parent_id === unit.id).sort(bySort);
  if (children.length) {
    const kids = document.createElement("div");
    kids.className = "unit-children";
    kids.style.setProperty("--line", c.line);
    children.forEach((ch) => kids.append(unitNode(ch, colors, counts)));
    wrap.append(kids);
  }
  return wrap;
}

/* ---------- 描画 ---------- */
function render() {
  const chart = $("#chart");
  chart.innerHTML = "";
  const colors = buildColors();
  const counts = buildCounts();
  state.units.filter((u) => u.parent_id === null).forEach((r) => chart.append(unitNode(r, colors, counts)));

  const waiting = state.employees
    .filter((e) => e.unit_id === null)
    .sort((a, b) => a.id - b.id);
  waiting.forEach((e, k) => {
    const card = personCard(e, false);
    card.classList.add("floating", "no-print");
    const chip = document.createElement("span");
    chip.className = "float-chip";
    chip.textContent = "待機";
    card.prepend(chip);
    card.style.left = (e.pos_x ?? 40) + "px";
    card.style.top = (e.pos_y ?? 420 + k * 50) + "px";
    chart.append(card);
  });

  $("#stats").textContent = `配置 ${state.employees.length - waiting.length}名 ／ 待機 ${waiting.length}名`;
  renderDb();
}

/* ---------- 人事DBビューア ---------- */
function renderDb() {
  const master = $("#db-master");
  const rows = state.employees
    .slice()
    .sort((a, b) => a.id - b.id)
    .map((e) => {
      const cls = e.id === state.lastMovedId ? ' class="just-moved"' : "";
      return `<tr${cls}><td>${e.id}</td><td>${esc(e.name)}</td><td>${esc(e.title)}</td><td>${esc(e.unit_path)}</td><td>${esc(e.updated_at)}</td></tr>`;
    })
    .join("");
  master.innerHTML = `<table>
    <thead><tr><th>ID</th><th>氏名</th><th>役職</th><th>所属</th><th>更新日時</th></tr></thead>
    <tbody>${rows}</tbody></table>`;

  const log = $("#db-log");
  log.innerHTML = state.log.length
    ? state.log
        .map((l) => {
          const titleChg =
            l.from_title && l.from_title !== l.to_title
              ? ` <span class="title-chg">役職 ${esc(l.from_title)} → ${esc(l.to_title)}</span>`
              : "";
          return `<div class="log-entry">
            <div class="when">#${l.id} ｜ ${esc(l.moved_at)}</div>
            <div class="route"><strong>${esc(l.employee_name)}</strong>：${esc(l.from_path)} <span class="arrow">→</span> ${esc(l.to_path)}${titleChg}</div>
          </div>`;
        })
        .join("")
    : '<div class="log-entry">異動履歴はまだありません</div>';
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

/* ---------- 異動処理（D&D → ブラウザ内DB 更新） ---------- */
async function moveEmployee(empId, toUnitId, opts = {}) {
  const row = db.employees.find((e) => e.id === empId);
  if (!row) { toast("エラー: 職員が見つかりません"); return { error: "not found" }; }
  const fromUnit = row.unit_id;
  const fromTitle = row.title;
  const toTitle = opts.newTitle || fromTitle;
  const unitChanged = fromUnit !== toUnitId;
  const titleChanged = toTitle !== fromTitle;
  const hasPos = opts.pos != null;
  if (!unitChanged && !titleChanged && !hasPos) return { ok: true, noop: true };

  const ts = nowStr();
  row.unit_id = toUnitId;
  row.title = toTitle;
  if (toUnitId === null) {
    row.pos_x = hasPos ? opts.pos.x : row.pos_x;
    row.pos_y = hasPos ? opts.pos.y : row.pos_y;
  } else {
    row.pos_x = null;
    row.pos_y = null;
  }
  row.updated_at = ts;
  if (unitChanged || titleChanged) {
    db.logSeq += 1;
    db.log.push({
      id: db.logSeq, employee_id: empId,
      from_unit_id: fromUnit, to_unit_id: toUnitId,
      from_title: fromTitle, to_title: toTitle, moved_at: ts,
    });
  }
  saveDb();

  state.lastMovedId = empId;
  fetchOrg();
  render();
  if (unitChanged || titleChanged) {
    const unit = state.units.find((u) => u.id === toUnitId);
    const dest = unit ? unit.name : "待機";
    const titleNote = titleChanged ? `（役職 ${fromTitle} → ${toTitle}）` : "";
    toast(`${row.name} を「${dest}」へ${titleNote} — 人事DB更新済み`);
  }
  return { ok: true, unit_changed: unitChanged, title_changed: titleChanged };
}

/* ---------- UI 部品 ---------- */
let toastTimer = null;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.hidden = false;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.hidden = true; }, 2800);
}

function setZoom(z) {
  state.zoom = Math.min(1.5, Math.max(0.4, z));
  $("#chart").style.transform = `scale(${state.zoom})`;
  $("#zoom-label").textContent = Math.round(state.zoom * 100) + "%";
}

function initUi() {
  $("#btn-zoom-in").addEventListener("click", () => setZoom(state.zoom + 0.1));
  $("#btn-zoom-out").addEventListener("click", () => setZoom(state.zoom - 0.1));
  $("#btn-print").addEventListener("click", () => {
    $("#print-date").textContent = "出力日時: " + new Date().toLocaleString("ja-JP") + "（人事データベースと同期済み・氏名/団体名は架空のサンプル）";
    window.print();
  });
  $("#btn-db").addEventListener("click", () => $("#dbpanel").classList.toggle("open"));
  $("#btn-db-close").addEventListener("click", () => $("#dbpanel").classList.remove("open"));
  document.querySelectorAll(".db-tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".db-tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      $("#db-master").hidden = tab.dataset.tab !== "master";
      $("#db-log").hidden = tab.dataset.tab !== "log";
    });
  });
  $("#btn-reset").addEventListener("click", () => {
    if (!confirm("人事データベース（ブラウザ内保存）を初期データに戻します。よろしいですか？")) return;
    db = seedDb();
    saveDb();
    state.lastMovedId = null;
    fetchOrg();
    render();
    toast("初期データに戻しました");
  });

  const stage = $("#stage");
  stage.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
  });
  stage.addEventListener("drop", async (e) => {
    e.preventDefault();
    const raw = e.dataTransfer.getData("text/plain");
    const id = Number.isInteger(dragCtx.id) ? dragCtx.id : parseInt(raw, 10);
    if (!Number.isInteger(id)) return;
    const rect = $("#chart").getBoundingClientRect();
    const x = Math.max(0, Math.round((e.clientX - rect.left) / state.zoom - (dragCtx.dx ?? 12)));
    const y = Math.max(0, Math.round((e.clientY - rect.top) / state.zoom - (dragCtx.dy ?? 12)));
    await moveEmployee(id, null, { pos: { x, y } });
  });
}

// テスト・デバッグ用に公開
window.app = { state, moveEmployee, fetchOrg, render };

initUi();
fetchOrg();
render();
</script>
